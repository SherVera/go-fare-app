# npm audit substitute: GitHub Dependency Review needs GHAS on private org repos.
name: Dependency audit

on:
  pull_request:
    branches: [main, staging, qa, dev]

permissions:
  contents: read

jobs:
  npm-audit:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: npm audit (high or higher)
        run: npm audit --audit-level=high
